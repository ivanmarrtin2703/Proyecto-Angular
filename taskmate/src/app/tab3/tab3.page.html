<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Avatar y nombre -->
  <div class="profile-header">
    <ion-avatar class="profile-avatar">
      <img src="https://ui-avatars.com/api/?name=Ivan+Martin+Molina&background=random&color=fff&size=128" />
    </ion-avatar>
    <h2>Iván Martín Molina</h2>
    <p>IES La Puebla — Almería</p>
    <ion-badge color="secondary">2º DAM</ion-badge>
    <ion-badge color="primary" class="ion-margin-top">Futuro Desarrollador</ion-badge>
  </div>

  <!-- Tecnologías que conoces -->
  <ion-card class="stack-card">
    <ion-card-header>
      <ion-card-subtitle>Stack tecnológico</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-chip color="primary"><ion-label>HTML</ion-label></ion-chip>
      <ion-chip color="secondary"><ion-label>CSS</ion-label></ion-chip>
      <ion-chip color="tertiary"><ion-label>Java</ion-label></ion-chip>
      <ion-chip color="warning"><ion-label>Angular</ion-label></ion-chip>
      <ion-chip color="success"><ion-label>Node.js</ion-label></ion-chip>
      <ion-chip color="danger"><ion-label>MySQL</ion-label></ion-chip>
    </ion-card-content>
  </ion-card>

  <!-- Lista de info -->
  <ion-list lines="none" class="info-list">
    <ion-item>
      <ion-icon name="school" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Centro de Estudios</h3>
        <p>IES La Puebla</p>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-icon name="calendar" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Curso Académico</h3>
        <p>2025/2026</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <!-- Botón para borrar datos (Reto Bonus) -->
  <div class="ion-margin-top ion-padding-top">
    <ion-button expand="block" color="danger" fill="outline" (click)="clearAllTasks()">
      <ion-icon name="trash-outline" slot="start"></ion-icon>
      Borrar todos los datos
    </ion-button>
    <p class="ion-text-center">
      <small style="color: var(--ion-color-medium)">
        Versión 1.0.0 — Persistencia en MySQL habilitada
      </small>
    </p>
  </div>

</ion-content>
