<ion-header>
  <ion-toolbar color="light">
    <ion-title>Nueva Tarea</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="taskForm" (ngSubmit)="$event.preventDefault(); save()">
    <!-- Campo Título con validación visual -->
    <ion-item [class.ion-invalid]="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
      <ion-label position="floating">Título *</ion-label>
      <ion-input formControlName="title" placeholder="¿Qué tienes que hacer?" autofocus></ion-input>
      <ion-note slot="error">{{ titleError }}</ion-note>
    </ion-item>

    <ion-item class="ion-margin-top">
      <ion-label position="floating">Descripción</ion-label>
      <ion-textarea formControlName="description" rows="3"></ion-textarea>
    </ion-item>

    <ion-item class="ion-margin-top">
      <ion-label>Prioridad</ion-label>
      <ion-select formControlName="priority">
        <ion-select-option value="alta">🔴 Alta</ion-select-option>
        <ion-select-option value="media">🟡 Media</ion-select-option>
        <ion-select-option value="baja">🟢 Baja</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item class="ion-margin-top">
      <ion-label>Categoría</ion-label>
      <ion-select formControlName="category">
        <ion-select-option value="personal">Personal</ion-select-option>
        <ion-select-option value="trabajo">Trabajo</ion-select-option>
        <ion-select-option value="estudio">Estudio</ion-select-option>
      </ion-select>
    </ion-item>

    <!-- Fecha en línea: evita ion-modal anidado (falla dentro del modal de Ionic) y mantiene formControlName bajo el mismo <form>. -->
    <div class="due-block ion-margin-top">
      <div class="due-head">
        <span class="due-title">Fecha límite (opcional)</span>
        @if (selectedDueDate) {
          <ion-button type="button" fill="clear" size="small" (click)="clearDueDate()">Quitar</ion-button>
        }
      </div>
      <div class="due-scroll">
        <ion-datetime
          presentation="date"
          [value]="selectedDueDate ?? undefined"
          (ionChange)="onDueDateChange($event)"
          [min]="minDueDate"
          locale="es-ES">
        </ion-datetime>
      </div>
    </div>

    <ion-button type="button" expand="block" class="ion-margin-top" (click)="save()" [disabled]="taskForm.invalid">
      Guardar Tarea
    </ion-button>
  </form>
</ion-content>
